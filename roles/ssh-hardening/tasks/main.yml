---
- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Deploy hardened sshd_config
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started

handlers:
  - name: Restart sshd
    systemd:
      name: ssh
      state: restarted
